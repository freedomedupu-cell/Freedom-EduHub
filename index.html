async function dbFetch(table, query="") {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}
async function dbInsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" },
    body: JSON.stringify(data)
  });
  return res.json();
}
async function dbUpdate(table, id, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "PATCH",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" },
    body: JSON.stringify(data)
  });
  return res.json();
}
async function dbDelete(table, id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  return res.ok;
}

function AIChat({messages,input,setInput,onSend,loading,role}){
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages,loading]);
  const placeholders={admin:"Ask about reports, planning, management...",teacher:"Ask for lesson plans, quiz ideas...",student:"Ask any question in Tamil, English or Sinhala..."};
  const welcomes={admin:"👋 Hello Director! I can help with academic planning and management.",teacher:"👋 Hello Teacher! I can help create lesson plans and quizzes.",student:"👋 வணக்கம்! I'm your AI Tutor. Ask me anything in Tamil, English or Sinhala!"};
  return <div><h2 style={{color:C.primary,marginBottom:16}}>🤖 AI Assistant</h2>
    <Card style={{display:"flex",flexDirection:"column",height:"calc(100vh - 240px)",padding:0,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:C.light,borderRadius:12,padding:14,fontSize:14,color:"#444"}}>{welcomes[role]}</div>
        {messages.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
          <div style={{maxWidth:"82%",background:m.role==="user"?grad:C.light,color:m.role==="user"?C.white:"#222",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"12px 16px",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>
        </div>)}
        {loading&&<div style={{background:C.light,borderRadius:12,padding:"12px 16px",color:C.gray,fontSize:14}}>⏳ Thinking...</div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:12,borderTop:`1px solid ${C.border}`,display:"flex",gap:10}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSend()} placeholder={placeholders[role]} style={{flex:1,padding:"12px 16px",borderRadius:24,border:`2px solid ${C.border}`,fontSize:14,outline:"none"}}/>
        <Btn onClick={onSend} disabled={loading} style={{borderRadius:24,padding:"12px 20px"}}>Send</Btn>

}

function LoginPage({onLogin}){
  const [role,setRole]=useState("student");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const roleConfig={admin:{icon:"🏛️",label:"Admin / Director",color:"#8e44ad"},teacher:{icon:"👨‍🏫",label:"Teacher",color:C.secondary},student:{icon:"👩‍🎓",label:"Student",color:C.accent}};
  const handleLogin=async()=>{
    setLoading(true);setError("");
    try{
      const users=await dbFetch("users",`?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(password)}&role=eq.${role}`);
      if(users && users.length>0){ onLogin(users[0]); }
      else{ setError("Invalid credentials. Please try again."); }
    }catch(e){ setError("Connection error. Try again."); }
    setLoading(false);
  };
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{textAlign:"center",marginBottom:32}}>
      <div style={{fontSize:56}}>🎓</div>
      <h1 style={{margin:"8px 0 4px",fontSize:28,fontWeight:900,color:C.primary}}>Freedom EduHub</h1>
      <p style={{color:C.gray,fontSize:14}}>School to Degree — All in One Platform</p>
    </div>
    <Card style={{width:"100%",maxWidth:420}}>
      <div style={{display:"flex",gap:8,marginBottom:24}}>
        {Object.entries(roleConfig).map(([r,cfg])=><button key={r} onClick={()=>{setRole(r);setError("");}} style={{flex:1,padding:"10px 6px",borderRadius:10,border:`2px solid ${role===r?cfg.color:C.border}`,background:role===r?cfg.color+"12":C.white,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <span style={{fontSize:20}}>{cfg.icon}</span>
          <span style={{fontSize:11,fontWeight:700,color:role===r?cfg.color:C.gray}}>{r.charAt(0).toUpperCase()+r.slice(1)}</span>
        </button>)}
      </div>
      <div style={{marginBottom:14}}>
        <label style={{fontSize:13,fontWeight:600,color:C.primary,display:"block",marginBottom:6}}>Email</label>
        <input value={email} onChange={e=>setEmail(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`2px solid ${C.border}`,fontSize:14,outline:"none"}}/>
      </div>
      <div style={{marginBottom:20}}>
        <label style={{fontSize:13,fontWeight:600,color:C.primary,display:"block",marginBottom:6}}>Password</label>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`2px solid ${C.border}`,fontSize:14,outline:"none"}}/>
      </div>
      {error&&<div style={{background:"#fdecea",color:C.red,borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:16}}>⚠️ {error}</div>}
      <Btn onClick={handleLogin} disabled={loading} style={{width:"100%",padding:"14px",fontSize:16}}>{loading?"Signing in...":`Sign in as ${roleConfig[role].label}`}</Btn>
    </Card>
  </div>;
}

function AdminDashboard({user,onLogout}){
  const [tab,setTab]=useState("overview");
  const [students,setStudents]=useState([]);
  const [teachers,setTeachers]=useState([]);
  const [announcements,setAnnouncements]=useState([]);
  const [loading,setLoading]=useState(true);
  const [newAnn,setNewAnn]=useState({title:"",body:""});
  const [showAnnForm,setShowAnnForm]=useState(false);
  const [showStudentForm,setShowStudentForm]=useState(false);
  const [newStudent,setNewStudent]=useState({name:"",email:"",password:"",grade:"Grade 10",roll_no:""});
  const [showTeacherForm,setShowTeacherForm]=useState(false);
  const [newTeacher,setNewTeacher]=useState({name:"",email:"",password:"",subject:"",grade:""});
  const [aiInput,setAiInput]=useState("");
  const [aiMessages,setAiMessages]=useState([]);
  const [aiLoading,setAiLoading]=useState(false);
  const loadData=async()=>{
    setLoading(true);
    const allUsers=await dbFetch("users","?select=*");
    setStudents(allUsers.filter(u=>u.role==="student"));
    setTeachers(allUsers.filter(u=>u.role==="teacher"));
    const ann=await dbFetch("announcements","?select=*&order=created_at.desc");
    setAnnouncements(ann);
    setLoading(false);
  };
  useEffect(()=>{loadData();},[]);

  const tabs=[
    {key:"overview",icon:"📊",label:"Overview"},
    {key:"students",icon:"👩‍🎓",label:"Students"},
    {key:"teachers",icon:"👨‍🏫",label:"Teachers"},
    {key:"announcements",icon:"📢",label:"Notices"},
    {key:"ai",icon:"🤖",label:"AI Help"},
  ];

  const addAnnouncement=async()=>{
    if(!newAnn.title||!newAnn.body)return;
    await dbInsert("announcements",{title:newAnn.title,body:newAnn.body,by_user:"Admin"});
    setNewAnn({title:"",body:""});setShowAnnForm(false);
    loadData();
  };

  const addStudent=async()=>{
    if(!newStudent.name||!newStudent.email||!newStudent.password)return;
    await dbInsert("users",{...newStudent,role:"student",avatar:"👦",attendance:100});
    setNewStudent({name:"",email:"",password:"",grade:"Grade 10",roll_no:""});setShowStudentForm(false);
    loadData();
  };
  const deleteStudent=async(id)=>{ await dbDelete("users",id); loadData(); };

  const addTeacher=async()=>{
    if(!newTeacher.name||!newTeacher.email||!newTeacher.password)return;
    await dbInsert("users",{...newTeacher,role:"teacher",avatar:"👨‍🏫"});
    setNewTeacher({name:"",email:"",password:"",subject:"",grade:""});setShowTeacherForm(false);
    loadData();
  };
  const deleteTeacher=async(id)=>{ await dbDelete("users",id); loadData(); };

  const sendAI=async()=>{
    if(!aiInput.trim())return;
    const userMsg={role:"user",content:aiInput};const msgs=[...aiMessages,userMsg];
    setAiMessages(msgs);setAiInput("");setAiLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:"You are an AI assistant for school/college admin directors. Help with academic planning, announcements, reports, student/teacher management. Be concise and professional.",messages:msgs})});
      const data=await res.json();
      setAiMessages([...msgs,{role:"assistant",content:data.content?.[0]?.text||"Error."}]);
    }catch{setAiMessages([...msgs,{role:"assistant",content:"Connection error."}]);}
    setAiLoading(false);
  };

  if(loading) return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor="#8e44ad"><Spinner/></Layout>;

  return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor="#8e44ad">
    {tab==="overview"&&<div>
      <h2 style={{color:C.primary,marginBottom:20}}>Welcome, {user.name} 👋</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:24}}>
        <Stat icon="👩‍🎓" label="Total Students" value={students.length} color={C.accent}/>
        <Stat icon="👨‍🏫" label="Teachers" value={teachers.length} color={C.secondary}/>
        <Stat icon="📚" label="Active Courses" value="32" color={C.green}/>
        <Stat icon="📊" label="Avg Attendance" value={students.length?Math.round(students.reduce((a,s)=>a+(s.attendance||0),0)/students.length)+"%":"0%"} color="#8e44ad"/>
      </div>
      <Card style={{marginBottom:16}}>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:16}}>📢 Latest Announcements</h3>
        {announcements.slice(0,2).map(a=><div key={a.id} style={{borderLeft:`4px solid ${C.accent}`,paddingLeft:12,marginBottom:12}}>
          <div style={{fontWeight:700,color:C.primary,fontSize:14}}>{a.title}</div>
          <div style={{fontSize:12,color:C.gray}}>{new Date(a.created_at).toLocaleDateString()} • by {a.by_user}</div>
        </div>)}
      </Card>
      <Card>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:16}}>👥 Students Overview</h3>
        {students.slice(0,3).map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <span style={{fontSize:28}}>{s.avatar}</span>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:C.primary}}>{s.name}</div><div style={{fontSize:12,color:C.gray}}>{s.roll_no} • {s.grade}</div></div>
          <Badge color={s.attendance>=90?C.green:s.attendance>=75?C.accent:C.red}>{s.attendance}%</Badge>
        </div>)}
      </Card>
    </div>}

    {tab==="students"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,color:C.primary}}>👩‍🎓 Students</h2>
        <Btn variant="accent" onClick={()=>setShowStudentForm(!showStudentForm)}>+ Add</Btn>

        <h3 style={{margin:"0 0 14px",color:C.primary}}>New Student</h3>
        <input placeholder="Full Name" value={newStudent.name} onChange={e=>setNewStudent({...newStudent,name:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>

        <input placeholder="Password" value={newStudent.password} onChange={e=>setNewStudent({...newStudent,password:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Grade (e.g. Grade 10)" value={newStudent.grade} onChange={e=>setNewStudent({...newStudent,grade:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Roll No" value={newStudent.roll_no} onChange={e=>setNewStudent({...newStudent,roll_no:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:12}}/>
        <div style={{display:"flex",gap:10}}><Btn onClick={addStudent}>Add Student</Btn><Btn variant="outline" onClick={()=>setShowStudentForm(false)}>Cancel</Btn></div>
      </Card>}
      {students.map(s=><Card key={s.id} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:36}}>{s.avatar}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:C.primary,fontSize:15}}>{s.name}</div>
            <div style={{fontSize:13,color:C.gray}}>{s.roll_no} • {s.grade}</div>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <Badge color={s.attendance>=90?C.green:s.attendance>=75?C.accent:C.red}>📅 {s.attendance}%</Badge>
            </div>
          </div>
          <Btn variant="danger" style={{padding:"6px 14px",fontSize:12}} onClick={()=>deleteStudent(s.id)}>Remove</Btn>
        </div>
      </Card>)}
    </div>}

    {tab==="teachers"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,color:C.primary}}>👨‍🏫 Teachers</h2>
        <Btn variant="accent" onClick={()=>setShowTeacherForm(!showTeacherForm)}>+ Add</Btn>
      </div>
      {showTeacherForm&&<Card style={{marginBottom:16,border:`2px solid ${C.accent}`}}>
        <h3 style={{margin:"0 0 14px",color:C.primary}}>New Teacher</h3>
        <input placeholder="Full Name" value={newTeacher.name} onChange={e=>setNewTeacher({...newTeacher,name:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Email" value={newTeacher.email} onChange={e=>setNewTeacher({...newTeacher,email:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Password" value={newTeacher.password} onChange={e=>setNewTeacher({...newTeacher,password:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Subject" value={newTeacher.subject} onChange={e=>setNewTeacher({...newTeacher,subject:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input placeholder="Grades Taught (e.g. Grade 9-12)" value={newTeacher.grade} onChange={e=>setNewTeacher({...newTeacher,grade:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:12}}/>
        <div style={{display:"flex",gap:10}}><Btn onClick={addTeacher}>Add Teacher</Btn><Btn variant="outline" onClick={()=>setShowTeacherForm(false)}>Cancel</Btn></div>
      </Card>}
      {teachers.map(t=><Card key={t.id} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:36}}>{t.avatar}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:C.primary,fontSize:15}}>{t.name}</div>
            <div style={{fontSize:13,color:C.gray}}>{t.subject} • {t.grade}</div>

          <Btn variant="danger" style={{padding:"6px 14px",fontSize:12}} onClick={()=>deleteTeacher(t.id)}>Remove</Btn>
        </div>
      </Card>)}
    </div>}

    {tab==="announcements"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,color:C.primary}}>📢 Announcements</h2>
        <Btn variant="accent" onClick={()=>setShowAnnForm(!showAnnForm)}>+ New</Btn>
      </div>
      {showAnnForm&&<Card style={{marginBottom:16,border:`2px solid ${C.accent}`}}>
        <h3 style={{margin:"0 0 14px",color:C.primary}}>New Announcement</h3>
        <input placeholder="Title" value={newAnn.title} onChange={e=>setNewAnn({...newAnn,title:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <textarea placeholder="Message..." value={newAnn.body} onChange={e=>setNewAnn({...newAnn,body:e.target.value})} rows={3} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,resize:"none",marginBottom:12}}/>
        <div style={{display:"flex",gap:10}}><Btn onClick={addAnnouncement}>Publish</Btn><Btn variant="outline" onClick={()=>setShowAnnForm(false)}>Cancel</Btn></div>
      </Card>}
      {announcements.map(a=><Card key={a.id} style={{marginBottom:12,borderLeft:`4px solid ${C.accent}`}}>
        <div style={{fontWeight:800,color:C.primary,fontSize:15,marginBottom:4}}>{a.title}</div>
        <div style={{fontSize:14,color:"#444",marginBottom:8}}>{a.body}</div>
        <div style={{fontSize:12,color:C.gray}}>{new Date(a.created_at).toLocaleDateString()} • by {a.by_user}</div>
      </Card>)}
    </div>}

    {tab==="ai"&&<AIChat messages={aiMessages} input={aiInput} setInput={setAiInput} onSend={sendAI} loading={aiLoading} role="admin"/>}
  </Layout>;
}

function TeacherDashboard({user,onLogout}){
  const [tab,setTab]=useState("overview");
  const [students,setStudents]=useState([]);
  const [assignments,setAssignments]=useState([]);
  const [announcements,setAnnouncements]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [newAssign,setNewAssign]=useState({title:"",due_date:""});
  const [aiMessages,setAiMessages]=useState([]);
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);

  const loadData=async()=>{
    setLoading(true);
    const allUsers=await dbFetch("users","?select=*&role=eq.student");
    setStudents(allUsers);
    const a=await dbFetch("assignments",`?select=*&teacher=eq.${encodeURIComponent(user.name)}&order=created_at.desc`);
    setAssignments(a);
    const ann=await dbFetch("announcements","?select=*&order=created_at.desc");
    setAnnouncements(ann);
    setLoading(false);
  };
  useEffect(()=>{loadData();},[]);

  const tabs=[{key:"overview",icon:"📊",label:"Overview"},{key:"students",icon:"👩‍🎓",label:"Students"},{key:"assignments",icon:"📝",label:"Assignments"},{key:"ai",icon:"🤖",label:"AI Help"}];

  const addAssign=async()=>{
    if(!newAssign.title||!newAssign.due_date)return;
    await dbInsert("assignments",{title:newAssign.title,due_date:newAssign.due_date,subject:user.subject,teacher:user.name,grade:user.grade||"Grade 10"});
    setNewAssign({title:"",due_date:""});setShowForm(false);
    loadData();
  };
  const deleteAssign=async(id)=>{ await dbDelete("assignments",id); loadData(); };

  const sendAI=async()=>{
    if(!aiInput.trim())return;
    const userMsg={role:"user",content:aiInput};const msgs=[...aiMessages,userMsg];
    setAiMessages(msgs);setAiInput("");setAiLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:`You are an AI teaching assistant for a ${user.subject} teacher. Help with lesson plans, quiz questions, assignment ideas, and teaching strategies.`,messages:msgs})});
      const data=await res.json();
      setAiMessages([...msgs,{role:"assistant",content:data.content?.[0]?.text||"Error."}]);
    }catch{setAiMessages([...msgs,{role:"assistant",content:"Connection error."}]);}
    setAiLoading(false);
  };

  if(loading) return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor={C.secondary}><Spinner/></Layout>;

  return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor={C.secondary}>
    {tab==="overview"&&<div>
      <h2 style={{color:C.primary,marginBottom:20}}>Welcome, {user.name} 👋</h2>
      <Card style={{background:grad,color:C.white,marginBottom:20}}>
        <div style={{fontSize:14,opacity:0.8}}>Your Subject</div>
        <div style={{fontSize:22,fontWeight:900}}>{user.subject}</div>
        <div style={{fontSize:13,opacity:0.8,marginTop:4}}>{user.grade}</div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:20}}>
        <Stat icon="👩‍🎓" label="Students" value={students.length} color={C.accent}/>
        <Stat icon="📝" label="Assignments" value={assignments.length} color={C.secondary}/>
      </div>
      <Card>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:16}}>📢 Announcements</h3>
        {announcements.map(a=><div key={a.id} style={{borderLeft:`4px solid ${C.secondary}`,paddingLeft:12,marginBottom:12}}>
          <div style={{fontWeight:700,color:C.primary,fontSize:14}}>{a.title}</div>
          <div style={{fontSize:12,color:C.gray}}>{new Date(a.created_at).toLocaleDateString()}</div>
        </div>)}
      </Card>
    </div>}
    {tab==="students"&&<div>
      <h2 style={{color:C.primary,marginBottom:16}}>👩‍🎓 Students</h2>
      {students.map(s=><Card key={s.id} style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:36}}>{s.avatar}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:C.primary}}>{s.name}</div>
            <div style={{fontSize:12,color:C.gray}}>{s.roll_no} • {s.grade}</div>
            <Badge color={s.attendance>=90?C.green:s.attendance>=75?C.accent:C.red}>📅 {s.attendance}%</Badge>
          </div>
        </div>
      </Card>)}
    </div>}
    {tab==="assignments"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,color:C.primary}}>📝 Assignments</h2>
        <Btn variant="accent" onClick={()=>setShowForm(!showForm)}>+ Create</Btn>
      </div>
      {showForm&&<Card style={{marginBottom:16,border:`2px solid ${C.accent}`}}>
        <h3 style={{margin:"0 0 14px",color:C.primary}}>New Assignment</h3>
        <input placeholder="Assignment title" value={newAssign.title} onChange={e=>setNewAssign({...newAssign,title:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:10}}/>
        <input type="date" value={newAssign.due_date} onChange={e=>setNewAssign({...newAssign,due_date:e.target.value})} style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${C.border}`,fontSize:14,marginBottom:12}}/>
        <div style={{display:"flex",gap:10}}><Btn onClick={addAssign}>Assign</Btn><Btn variant="outline" onClick={()=>setShowForm(false)}>Cancel</Btn></div>
      </Card>}
      {assignments.map(a=><Card key={a.id} style={{marginBottom:12,borderLeft:`4px solid ${C.accent}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontWeight:800,color:C.primary,fontSize:15}}>{a.title}</div><div style={{fontSize:12,color:C.gray,marginTop:4}}>{a.subject} • Due: {a.due_date}</div></div>
          <Btn variant="danger" style={{padding:"6px 14px",fontSize:12}} onClick={()=>deleteAssign(a.id)}>Delete</Btn>
        </div>
      </Card>)}
    </div>}
    {tab==="ai"&&<AIChat messages={aiMessages} input={aiInput} setInput={setAiInput} onSend={sendAI} loading={aiLoading} role="teacher"/>}
  </Layout>;
}

function StudentDashboard({user,onLogout}){
  const [tab,setTab]=useState("overview");
  const [assignments,setAssignments]=useState([]);
  const [announcements,setAnnouncements]=useState([]);
  const [loading,setLoading]=useState(true);
  const [aiMessages,setAiMessages]=useState([]);
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [quizSubject,setQuizSubject]=useState(null);
  const [quizIdx,setQuizIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [score,setScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const loadData=async()=>{
    setLoading(true);
    const a=await dbFetch("assignments",`?select=*&grade=eq.${encodeURIComponent(user.grade)}&order=created_at.desc`);
    setAssignments(a);
    const ann=await dbFetch("announcements","?select=*&order=created_at.desc");
    setAnnouncements(ann);
    setLoading(false);
  };
  useEffect(()=>{loadData();},[]);

  const tabs=[{key:"overview",icon:"🏠",label:"Home"},{key:"assignments",icon:"📝",label:"Assignments"},{key:"quiz",icon:"✏️",label:"Quiz"},{key:"ai",icon:"🤖",label:"AI Tutor"}];

  const sendAI=async()=>{
    if(!aiInput.trim())return;
    const userMsg={role:"user",content:aiInput};const msgs=[...aiMessages,userMsg];
    setAiMessages(msgs);setAiInput("");setAiLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:"You are a friendly AI tutor for school/college students. Answer simply. Respond in Tamil, English, or Sinhala based on what the student uses. Encourage and help them understand concepts clearly.",messages:msgs})});
      const data=await res.json();
      setAiMessages([...msgs,{role:"assistant",content:data.content?.[0]?.text||"Error."}]);
    }catch{setAiMessages([...msgs,{role:"assistant",content:"Connection error."}]);}
    setAiLoading(false);
  };
  const startQuiz=(sub)=>{setQuizSubject(sub);setQuizIdx(0);setScore(0);setSelected(null);setAnswered(false);setQuizDone(false);};
  const handleAnswer=(i)=>{if(answered)return;setSelected(i);setAnswered(true);if(i===quizData[quizSubject][quizIdx].ans)setScore(s=>s+1);};
  const nextQ=()=>{if(quizIdx+1>=quizData[quizSubject].length)setQuizDone(true);else{setQuizIdx(i=>i+1);setSelected(null);setAnswered(false);}};

  if(loading) return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor={C.accent}><Spinner/></Layout>;

  return <Layout user={user} onLogout={onLogout} tabs={tabs} activeTab={tab} setTab={setTab} accentColor={C.accent}>
    {tab==="overview"&&<div>
      <h2 style={{color:C.primary,marginBottom:4}}>Hello, {user.name}! 👋</h2>
      <p style={{color:C.gray,marginBottom:20,fontSize:14}}>{user.roll_no} • {user.grade}</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14,marginBottom:20}}>
        <Stat icon="📅" label="Attendance" value={`${user.attendance}%`} color={user.attendance>=90?C.green:C.accent}/>
        <Stat icon="📝" label="Assignments" value={assignments.length} color={C.secondary}/>
      </div>
      <Card style={{marginBottom:16}}>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:16}}>📢 Notices</h3>
        {announcements.map(a=><div key={a.id} style={{borderLeft:`4px solid ${C.accent}`,paddingLeft:12,marginBottom:12}}>
          <div style={{fontWeight:700,color:C.primary,fontSize:14}}>{a.title}</div>
          <div style={{fontSize:13,color:"#555",marginTop:2}}>{a.body}</div>
          <div style={{fontSize:11,color:C.gray,marginTop:4}}>{new Date(a.created_at).toLocaleDateString()}</div>
        </div>)}
      </Card>
      <Card>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:16}}>⏰ Upcoming Deadlines</h3>
        {assignments.map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div><div style={{fontWeight:600,fontSize:14,color:C.primary}}>{a.title}</div><div style={{fontSize:12,color:C.gray}}>{a.subject}</div></div>
          <Badge color={C.red}>Due {a.due_date}</Badge>
        </div>)}
      </Card>
    </div>}
    {tab==="assignments"&&<div>
      <h2 style={{color:C.primary,marginBottom:16}}>📝 My Assignments</h2>
      {assignments.map(a=><Card key={a.id} style={{marginBottom:12,borderLeft:`4px solid ${C.accent}`}}>
        <div style={{fontWeight:800,color:C.primary,fontSize:15}}>{a.title}</div>
        <div style={{fontSize:12,color:C.gray,marginTop:4}}>{a.subject} • {a.teacher}</div>
        <div style={{fontSize:12,color:C.gray}}>Due: {a.due_date}</div>
      </Card>)}
    </div>}
    {tab==="quiz"&&<div>
      <h2 style={{color:C.primary,marginBottom:16}}>✏️ Practice Quiz</h2>
      {!quizSubject?<div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
        {Object.keys(quizData).map(sub=><button key={sub} onClick={()=>startQuiz(sub)} style={{background:C.white,border:`2px solid ${C.border}`,borderRadius:14,padding:"28px 16px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <span style={{fontSize:36}}>{sub==="Mathematics"?"📐":"🔬"}</span>
          <span style={{fontWeight:700,color:C.primary}}>{sub}</span>
          <span style={{fontSize:12,color:C.gray}}>{quizData[sub].length} Questions</span>
        </button>)}
      </div>:quizDone?<Card style={{textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:12}}>{score===quizData[quizSubject].length?"🏆":"📚"}</div>
        <h3 style={{color:C.primary}}>Your Score</h3>
        <div style={{fontSize:48,fontWeight:900,color:score>=2?C.green:C.red}}>{score}/{quizData[quizSubject].length}</div>
        <p style={{color:C.gray,marginBottom:20}}>{score===quizData[quizSubject].length?"Perfect! 🌟":"Keep practicing! 💪"}</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <Btn onClick={()=>startQuiz(quizSubject)}>Try Again</Btn>
          <Btn variant="outline" onClick={()=>setQuizSubject(null)}>Back</Btn>
        </div>
      </Card>:<Card>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{fontWeight:700,color:C.primary}}>{quizSubject}</span>
          <span style={{color:C.gray}}>{quizIdx+1}/{quizData[quizSubject].length}</span>
        </div>
        <div style={{background:C.light,borderRadius:8,height:8,marginBottom:20}}>
          <div style={{height:"100%",background:grad,borderRadius:8,width:`${((quizIdx+1)/quizData[quizSubject].length)*100}%`,transition:"width 0.3s"}}/>
        </div>
        <h3 style={{color:"#222",marginBottom:18,fontSize:16,lineHeight:1.5}}>{quizData[quizSubject][quizIdx].q}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {quizData[quizSubject][quizIdx].options.map((opt,i)=>{
            let bg=C.white,border=`2px solid ${C.border}`,color="#333";
            if(answered){if(i===quizData[quizSubject][quizIdx].ans){bg="#d4edda";border=`2px solid ${C.green}`;color="#155724";}else if(i===selected){bg="#f8d7da";border=`2px solid ${C.red}`;color="#721c24";}}
            return <button key={i} onClick={()=>handleAnswer(i)} style={{background:bg,border,borderRadius:10,padding:"12px 16px",textAlign:"left",cursor:answered?"default":"pointer",color,fontWeight:500,fontSize:14}}><strong>{["A","B","C","D"][i]}.</strong> {opt}</button>;
          })}
        </div>
        {answered&&<div style={{marginTop:16,textAlign:"center"}}>
          <div style={{fontWeight:700,color:selected===quizData[quizSubject][quizIdx].ans?C.green:C.red,marginBottom:12,fontSize:16}}>{selected===quizData[quizSubject][quizIdx].ans?"✅ Correct!":"❌ Wrong!"}</div>
          <Btn onClick={nextQ}>{quizIdx+1>=quizData[quizSubject].length?"See Results":"Next →"}</Btn>
        </div>}
      </Card>}
    </div>}
    {tab==="ai"&&<AIChat messages={aiMessages} input={aiInput} setInput={setAiInput} onSend={sendAI} loading={aiLoading} role="student"/>}
  </Layout>;
}

function App(){
  const [currentUser,setCurrentUser]=useState(null);
  if(!currentUser)return <LoginPage onLogin={setCurrentUser}/>;
  if(currentUser.role==="admin")return <AdminDashboard user={currentUser} onLogout={()=>setCurrentUser(null)}/>;
  if(currentUser.role==="teacher")return <TeacherDashboard user={currentUser} onLogout={()=>setCurrentUser(null)}/>;
  if(currentUser.role==="student")return <StudentDashboard user={currentUser} onLogout={()=>setCurrentUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
